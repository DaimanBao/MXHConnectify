<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân • Instagram Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Hiệu ứng trượt vào từ bên phải cho thông báo Toast */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .animate-slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }
        /* Hiệu ứng zoom nhẹ cho icon tim khi tương tác */
        @keyframes scaleUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .animate-scale-up {
            animation: scaleUp 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col space-y-3">
    <div id="success-toast" th:if="${successMessage}"
         class="bg-white border-l-4 border-green-500 shadow-lg p-4 rounded-lg flex items-center space-x-3 animate-slide-in">
        <i class="fa-solid fa-circle-check text-green-500"></i>
        <span class="text-sm text-gray-700 font-medium" th:text="${successMessage}"></span>
    </div>

    <div id="error-toast" th:if="${errorMessage}"
         class="bg-white border-l-4 border-red-500 shadow-lg p-4 rounded-lg flex items-center space-x-3 animate-slide-in">
        <i class="fa-solid fa-circle-exclamation text-red-500"></i>
        <span class="text-sm text-gray-700 font-medium" th:text="${errorMessage}"></span>
    </div>
</div>

<div class="flex h-screen overflow-hidden">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{modals/edit-profile-modal :: editProfileModal}"></div>
    <div th:replace="~{modals/avatar-modal :: avatarModal}"></div>

    <main class="flex-1 pl-20 xl:pl-64 overflow-y-auto h-full flex justify-center">
        <div class="w-full max-w-[935px] pt-8 px-4 pb-12">

            <header class="grid grid-cols-3 gap-4 md:gap-10 pb-10 border-b border-gray-200 items-center">
                <div class="flex justify-center">
                    <div class="w-20 h-20 md:w-36 md:h-36 rounded-full p-[3px] bg-gray-200 cursor-pointer relative group"
                         onclick="openAvatarModal()">
                        <img th:src="${user.avatarUrl != null ? (user.avatarUrl + '?t=' + #dates.createNow().getTime()) : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                             class="w-full h-full rounded-full object-cover border-4 border-white">
                        <div class="absolute inset-0 bg-black/40 rounded-full hidden group-hover:flex items-center justify-center text-white text-xs font-semibold">
                            <i class="fa-solid fa-camera text-xl"></i>
                        </div>
                    </div>
                </div>

                <div class="col-span-2 space-y-4">
                    <div class="flex flex-col sm:flex-row sm:items-center space-y-2 sm:space-y-0 sm:space-x-6">
                        <h2 class="text-xl font-light tracking-wide" th:text="${user.username}">username</h2>
                        <div class="flex space-x-2">
                            <button th:if="${isOwner}" onclick="openEditModal()" class="bg-gray-100 hover:bg-gray-200 text-black text-sm font-semibold px-4 py-1.5 rounded-lg transition duration-200">
                                Chỉnh sửa trang cá nhân
                            </button>

                            <div th:if="${!isOwner}" id="follow-btn-container">
                                <button th:if="${isFollowing}" onclick="handleFollowToggle()" class="bg-gray-200 hover:bg-gray-300 text-black text-sm font-semibold px-6 py-1.5 rounded-lg transition duration-200">
                                    Đang theo dõi
                                </button>
                                <button th:if="${!isFollowing}" onclick="handleFollowToggle()" class="bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold px-6 py-1.5 rounded-lg transition duration-200">
                                    Theo dõi
                                </button>
                            </div>

                            <button class="bg-gray-100 hover:bg-gray-200 text-black text-sm p-1.5 rounded-lg transition duration-200">
                                <i class="fa-solid fa-gear"></i>
                            </button>
                        </div>
                    </div>

                    <ul class="hidden sm:flex space-x-10 text-sm">
                        <li><span class="font-semibold" th:text="${postCount}">0</span> bài viết</li>
                        <li><span id="follower-count-pc" class="font-semibold" th:text="${followerCount}">0</span> người theo dõi</li>
                        <li><span class="font-semibold" th:text="${followingCount}">0</span> đang theo dõi</li>
                    </ul>

                    <div class="text-sm space-y-1">
                        <h1 class="font-semibold" th:text="${user.fullName}">Họ và Tên</h1>
                        <p class="text-gray-500 text-xs" th:text="${user.headline} ?: 'Chưa có mô tả nào ở Head Line.'">Headline</p>
                        <p class="text-gray-700" th:text="${user.description} ?: 'Chưa có mô tả nào ở Description.'">Description</p>
                        <div th:if="${not #lists.isEmpty(user.communityLinksList)}">
                            <p class="text-xs font-semibold mb-1">Liên kết của tôi:</p>
                            <a th:each="link : ${user.communityLinksList}"
                               th:href="${link}"
                               target="_blank"
                               class="text-blue-900 font-semibold block hover:underline text-xs">
                                <i class="fa-solid fa-link mr-1"></i> <span th:text="${link}"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </header>

            <ul class="flex sm:hidden justify-around border-b border-gray-200 py-3 text-center text-xs text-gray-500 bg-white">
                <li><strong class="block text-gray-900 font-semibold" th:text="${postCount}">0</strong> bài viết</li>
                <li><strong id="follower-count-mb" class="block text-gray-900 font-semibold" th:text="${followerCount}">0</strong> người theo dõi</li>
                <li><strong class="block text-gray-900 font-semibold" th:text="${followingCount}">0</strong> đang theo dõi</li>
            </ul>

            <div class="flex justify-center space-x-12 border-t border-gray-200 text-xs uppercase tracking-widest font-semibold select-none">
                <button id="tab-posts-btn" onclick="switchProfileTab('posts')"
                        class="border-t-2 border-black text-black py-4 flex items-center space-x-1.5 focus:outline-none transition duration-150">
                    <i class="fa-solid fa-table-cells text-[10px]"></i>
                    <span>Bài viết</span>
                </button>
                <button th:if="${isOwner}" id="tab-saved-btn" onclick="switchProfileTab('saved')"
                        class="border-t-2 border-transparent text-gray-400 py-4 flex items-center space-x-1.5 hover:text-black focus:outline-none transition duration-150">
                    <i class="fa-regular fa-bookmark text-[10px]"></i>
                    <span>Đã lưu</span>
                </button>
            </div>

            <div class="mt-4">

                <div id="profile-posts-container" class="grid grid-cols-3 gap-1 md:gap-7">
                    <div th:each="post : ${posts}" class="relative aspect-square bg-gray-200 group overflow-hidden cursor-pointer rounded">
                        <div class="absolute inset-0 z-10"
                             onclick="openPostDetailModal(this)"
                             th:data-post-id="${post.id}"
                             th:data-post-content="${post.content}"
                             th:data-post-like-count="${post.likeCount != null ? post.likeCount : 0}"
                             th:data-post-is-liked="${post.isLikedByCurrentUser}"
                             th:data-post-is-saved="${post.isSavedByCurrentUser}"
                             th:data-post-date="${post.createdAt}"
                             th:data-user-id="${post.user.id}"
                             th:data-user-username="${post.user.username}"
                             th:data-user-avatar="${post.user.avatarUrl != null && !post.user.avatarUrl.isEmpty() ? post.user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">

                            <input type="hidden" class="media-item-data" th:each="m : ${post.mediaList}" th:data-id="${m.id}" th:data-type="${m.type}" th:data-url="${m.url}" />
                        </div>

                        <img th:src="${post.mediaList != null && !post.mediaList.isEmpty() ? post.mediaList[0].url : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500'}"
                             class="w-full h-full object-cover transition duration-300 group-hover:scale-105">

                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center space-x-6 text-white font-bold transition duration-200 pointer-events-none z-20">
                            <span><i class="fa-solid fa-heart mr-2"></i><span th:text="${post.likeCount != null ? post.likeCount : 0}">0</span></span>
                            <span><i class="fa-solid fa-comment mr-2"></i><span th:text="${post.commentCount != null ? post.commentCount : 0}">0</span></span>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(posts)}" class="col-span-3 text-center py-20 text-gray-400 select-none">
                        <div class="w-16 h-16 mx-auto border-2 border-gray-400 rounded-full flex items-center justify-center mb-3">
                            <i class="fa-solid fa-camera text-2xl"></i>
                        </div>
                        <p class="text-sm font-semibold text-gray-800">Chưa có bài viết nào</p>
                    </div>
                </div>

                <div th:if="${isOwner}" id="profile-saved-container" class="grid grid-cols-3 gap-1 md:gap-7 hidden">
                    <div th:each="post : ${savedPosts}" class="relative aspect-square bg-gray-200 group overflow-hidden cursor-pointer rounded">
                        <div class="absolute inset-0 z-10"
                             onclick="openPostDetailModal(this)"
                             th:data-post-id="${post.id}"
                             th:data-post-content="${post.content}"
                             th:data-post-like-count="${post.likeCount != null ? post.likeCount : 0}"
                             th:data-post-is-liked="${post.isLikedByCurrentUser}"
                             th:data-post-is-saved="${post.isSavedByCurrentUser}"
                             th:data-post-date="${post.createdAt}"
                             th:data-user-id="${post.user.id}"
                             th:data-user-username="${post.user.username}"
                             th:data-user-avatar="${post.user.avatarUrl != null && !post.user.avatarUrl.isEmpty() ? post.user.avatarUrl : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">

                            <input type="hidden" class="media-item-data" th:each="m : ${post.mediaList}" th:data-id="${m.id}" th:data-type="${m.type}" th:data-url="${m.url}" />
                        </div>

                        <img th:src="${post.mediaList != null && !post.mediaList.isEmpty() ? post.mediaList[0].url : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500'}"
                             class="w-full h-full object-cover transition duration-300 group-hover:scale-105">

                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center space-x-6 text-white font-bold transition duration-200 pointer-events-none z-20">
                            <span><i class="fa-solid fa-heart mr-2"></i><span th:text="${post.likeCount != null ? post.likeCount : 0}">0</span></span>
                            <span><i class="fa-solid fa-comment mr-2"></i><span th:text="${post.commentCount != null ? post.commentCount : 0}">0</span></span>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(savedPosts)}" class="col-span-3 text-center py-20 text-gray-400 select-none">
                        <div class="w-16 h-16 mx-auto border-2 border-gray-400 rounded-full flex items-center justify-center mb-3">
                            <i class="fa-regular fa-bookmark text-2xl"></i>
                        </div>
                        <p class="text-sm font-semibold text-gray-800">Chưa lưu bài viết nào</p>
                        <p class="text-xs text-gray-400 mt-1">Khi bạn lưu bài viết, chúng sẽ xuất hiện tại đây.</p>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<div th:replace="~{modals/post-detail-modal :: postDetailModal}"></div>

<script th:inline="javascript">
    // Biến toàn cục phục vụ điều khiển Slide phương tiện bên trong Modal bài viết
    let currentModalMediaList = [];
    let currentModalMediaIndex = 0;

    // Hàm điều khiển chuyển đổi hiển thị mượt mà qua lại giữa 2 Tab
    function switchProfileTab(tabName) {
        const postsContainer = document.getElementById('profile-posts-container');
        const savedContainer = document.getElementById('profile-saved-container');
        const postsBtn = document.getElementById('tab-posts-btn');
        const savedBtn = document.getElementById('tab-saved-btn');

        if (tabName === 'posts') {
            postsContainer.classList.remove('hidden');
            if (savedContainer) savedContainer.classList.add('hidden');

            postsBtn.className = "border-t-2 border-black text-black py-4 flex items-center space-x-1.5 focus:outline-none transition duration-150";
            if (savedBtn) savedBtn.className = "border-t-2 border-transparent text-gray-400 py-4 flex items-center space-x-1.5 hover:text-black focus:outline-none transition duration-150";
        } else if (tabName === 'saved') {
            postsContainer.classList.add('hidden');
            if (savedContainer) savedContainer.classList.remove('hidden');

            postsBtn.className = "border-t-2 border-transparent text-gray-400 py-4 flex items-center space-x-1.5 hover:text-black focus:outline-none transition duration-150";
            if (savedBtn) savedBtn.className = "border-t-2 border-black text-black py-4 flex items-center space-x-1.5 focus:outline-none transition duration-150";
        }
    }

    // Hàm mở Post Detail Modal và nạp toàn bộ cấu trúc dữ liệu giao diện bài viết như trang chủ
    function openPostDetailModal(element) {
        const postId = element.getAttribute('data-post-id');
        const content = element.getAttribute('data-post-content') || '';
        const likeCount = element.getAttribute('data-post-like-count');
        const isLiked = element.getAttribute('data-post-is-liked') === 'true';
        const isSaved = element.getAttribute('data-post-is-saved') === 'true';
        const postDate = element.getAttribute('data-post-date');
        const userId = element.getAttribute('data-user-id');
        const username = element.getAttribute('data-user-username');
        const avatarUrl = element.getAttribute('data-user-avatar');

        // Bóc mảng MediaList ẩn bên trong thẻ
        currentModalMediaList = [];
        element.querySelectorAll('.media-item-data').forEach(input => {
            currentModalMediaList.push({
                type: input.getAttribute('data-type'),
                url: input.getAttribute('data-url')
            });
        });
        currentModalMediaIndex = 0;

        // Ánh xạ dữ liệu lên Header & Mô tả của Modal
        document.getElementById('modal-user-avatar').src = avatarUrl;
        document.getElementById('modal-caption-avatar').src = avatarUrl;
        document.getElementById('modal-user-username').innerText = username;
        document.getElementById('modal-caption-username').innerText = username;
        document.getElementById('modal-post-content').innerText = content;
        document.getElementById('modal-like-count').innerText = `${likeCount} lượt thích`;

        if (postDate) {
            try {
                const dateObj = new Date(postDate);
                document.getElementById('modal-post-date').innerText = dateObj.toLocaleDateString('vi-VN');
            } catch(e) {
                document.getElementById('modal-post-date').innerText = postDate;
            }
        }

        // Cài đặt nút LIKE AJAX
        const likeBtn = document.getElementById('modal-like-btn');
        likeBtn.setAttribute('onclick', `toggleLikeInModal(this, '${postId}')`);
        likeBtn.querySelector('i').className = isLiked ? "fa-solid fa-heart text-red-500" : "fa-regular fa-heart";

        // Cài đặt nút SAVE AJAX (Quy tắc: Ẩn nút nếu bài viết thuộc về chính mình đang xem)
        const saveBtn = document.getElementById('modal-save-btn');
        const isProfileOwner = [[${isOwner}]];

        if (element.closest('#profile-posts-container') && isProfileOwner) {
            saveBtn.classList.add('hidden');
        } else {
            saveBtn.classList.remove('hidden');
            saveBtn.setAttribute('onclick', `toggleSaveInModal(this, '${postId}')`);
            saveBtn.querySelector('i').className = isSaved ? "fa-solid fa-bookmark text-black" : "fa-regular fa-bookmark";
        }

        // Tiến hành dựng hiển thị Slide Media
        renderModalMedia();

        // Mở Modal kèm hiệu ứng mượt mà
        const modal = document.getElementById('post-detail-modal');
        modal.classList.remove('hidden');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
        }, 50);
    }

    // Hàm dựng và trình chiếu Media (Ảnh/Video) bên trái Modal bài đăng
    function renderModalMedia() {
        const container = document.getElementById('modal-media-container');
        const prevBtn = document.getElementById('modal-media-prev');
        const nextBtn = document.getElementById('modal-media-next');
        container.innerHTML = '';

        if (currentModalMediaList.length === 0) {
            container.innerHTML = `<img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" class="w-full h-full object-cover">`;
            prevBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');
            return;
        }

        const media = currentModalMediaList[currentModalMediaIndex];
        if (media.type === 'VIDEO') {
            container.innerHTML = `<video src="${media.url}" controls autoplay loop class="w-full h-full object-contain"></video>`;
        } else {
            container.innerHTML = `<img src="${media.url}" class="w-full h-full object-contain">`;
        }

        // Xử lý ẩn/hiện nút điều hướng mũi tên Slide
        if (currentModalMediaIndex > 0) prevBtn.classList.remove('hidden');
        else prevBtn.classList.add('hidden');

        if (currentModalMediaIndex < currentModalMediaList.length - 1) nextBtn.classList.remove('hidden');
        else nextBtn.classList.add('hidden');

        prevBtn.onclick = (e) => { e.stopPropagation(); if(currentModalMediaIndex > 0) { currentModalMediaIndex--; renderModalMedia(); } };
        nextBtn.onclick = (e) => { e.stopPropagation(); if(currentModalMediaIndex < currentModalMediaList.length - 1) { currentModalMediaIndex++; renderModalMedia(); } };
    }

    // Hàm đóng Modal chi tiết bài viết và dọn sạch vùng media (tránh nhạc video chạy ngầm)
    function closePostDetailModal() {
        const modal = document.getElementById('post-detail-modal');
        modal.classList.add('opacity-0');
        modal.querySelector('div').classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            document.getElementById('modal-media-container').innerHTML = '';
        }, 300);
    }

    // Gọi API Like AJAX từ Modal và reload trang để đồng bộ chỉ số ngoài màn hình nền
    async function toggleLikeInModal(button, postId) {
        const heartIcon = button.querySelector('i');
        const likeCountTxt = document.getElementById('modal-like-count');
        button.disabled = true;

        try {
            const response = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
            const data = await response.json();
            if (data.success) {
                heartIcon.className = data.liked ? "fa-solid fa-heart text-red-500 animate-scale-up" : "fa-regular fa-heart";
                likeCountTxt.innerText = `${data.likeCount} lượt thích`;

                // Trải nghiệm tinh tế: Tải lại trang sau khi tương tác ở modal để đồng bộ lưới bài viết phía sau
                setTimeout(() => { window.location.reload(); }, 500);
            }
        } catch (e) { console.error("Lỗi tương tác Like tại Modal:", e); }
        finally { button.disabled = false; }
    }

    // Gọi API Save AJAX từ Modal
    async function toggleSaveInModal(button, postId) {
        const bookmarkIcon = button.querySelector('i');
        button.disabled = true;

        try {
            const response = await fetch(`/api/posts/${postId}/save`, { method: 'POST' });
            const data = await response.json();
            if (data.success) {
                bookmarkIcon.className = data.saved ? "fa-solid fa-bookmark text-black animate-scale-up" : "fa-regular fa-bookmark";
                setTimeout(() => { window.location.reload(); }, 500);
            } else {
                alert(data.message);
            }
        } catch (e) { console.error("Lỗi tương tác Save tại Modal:", e); }
        finally { button.disabled = false; }
    }

    // -------------------------------------------------------------
    // LOGIC CODE CŨ QUẢN LÝ FORM CHỈNH SỬA, AVATAR VÀ FOLLOW (GIỮ NGUYÊN 100%)
    // -------------------------------------------------------------
    let linksArray = [];

    function openEditModal() {
        let initialLinksStr = [[${user.communityLinks}]] || "";
        linksArray = initialLinksStr ? initialLinksStr.split(',').map(s => s.trim()).filter(s => s.length > 0) : [];
        document.getElementById('editProfileModal').classList.remove('hidden');
        renderLinks();
    }

    function closeEditModal() {
        document.getElementById('editProfileModal').classList.add('hidden');
    }

    function renderLinks() {
        const container = document.getElementById('linksContainer');
        if (!container) return;
        container.innerHTML = '';

        linksArray.forEach((link, index) => {
            const linkRow = document.createElement('div');
            linkRow.className = "flex items-center justify-between bg-blue-50 border border-blue-100 rounded-lg px-3 py-1.5 text-xs text-blue-900 font-medium";
            linkRow.innerHTML = `
                <div class="flex items-center space-x-2 truncate">
                    <i class="fa-solid fa-link text-blue-400 text-[10px]"></i>
                    <span class="truncate">${link}</span>
                </div>
                <button type="button" onclick="removeLink(${index})" class="text-blue-400 hover:text-red-500 font-bold ml-2 text-sm focus:outline-none">
                    &times;
                </button>
            `;
            container.appendChild(linkRow);
        });
    }

    function addLinkFromInput() {
        const input = document.getElementById('linkInput');
        const value = input.value.trim();
        if (value !== "") {
            if(!linksArray.includes(value)) {
                linksArray.push(value);
                renderLinks();
            }
            input.value = "";
        }
    }

    function removeLink(index) {
        linksArray.splice(index, 1);
        renderLinks();
    }

    function prepareSubmitData() {
        document.getElementById('finalLinksInput').value = linksArray.join(',');
    }

    document.addEventListener("DOMContentLoaded", function() {
        const toasts = document.querySelectorAll('#success-toast, #error-toast');
        toasts.forEach(toast => {
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        });
    });

    function openAvatarModal() { document.getElementById('avatarModal').classList.remove('hidden'); }
    function closeAvatarModal() { document.getElementById('avatarModal').classList.add('hidden'); }

    function handleFollowToggle() {
        const username = [[${user.username}]];
        fetch(`/profile/${username}/follow`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => {
            if (response.status === 401) {
                alert("Vui lòng đăng nhập để thực hiện tính năng này!");
                window.location.href = "/login";
                return;
            }
            return response.json();
        })
        .then(data => {
            if (data && data.success) {
                const container = document.getElementById('follow-btn-container');
                if (data.isFollowing) {
                    container.innerHTML = `<button onclick=\"handleFollowToggle()\" class=\"bg-gray-200 hover:bg-gray-300 text-black text-sm font-semibold px-6 py-1.5 rounded-lg transition duration-200\">Đang theo dõi</button>`;
                } else {
                    container.innerHTML = `<button onclick=\"handleFollowToggle()\" class=\"bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold px-6 py-1.5 rounded-lg transition duration-200\">Theo dõi</button>`;
                }
                if(document.getElementById('follower-count-pc')) document.getElementById('follower-count-pc').innerText = data.followerCount;
                if(document.getElementById('follower-count-mb')) document.getElementById('follower-count-mb').innerText = data.followerCount;
            }
        })
        .catch(error => console.error("Lỗi hệ thống đồng bộ tính năng Follow:", error));
    }
</script>
</body>
</html>
