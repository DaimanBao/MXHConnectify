<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm • Instagram Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<div class="flex h-screen">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 pl-20 xl:pl-64 h-screen overflow-y-auto">
        <div class="max-w-2xl mx-auto pt-10 px-6 pb-20">

            <h2 class="text-2xl font-bold mb-8">Tìm kiếm</h2>

            <div class="relative mb-10">
                <input type="text" id="search-input"
                       placeholder="Nhập tên người dùng..."
                       class="w-full bg-white border border-gray-300 rounded-lg py-3 px-4 outline-none focus:border-gray-500 transition shadow-sm">
                <i class="fa-solid fa-magnifying-glass absolute right-4 top-3.5 text-gray-400"></i>
            </div>

            <div id="search-results" class="space-y-6">
            </div>

            <div id="loading-spinner" class="text-center py-6 hidden">
                <i class="fa-solid fa-spinner fa-spin text-2xl text-gray-400"></i>
            </div>

        </div>
    </main>
</div>

<script>
    let currentPage = 0;
    let currentKeyword = "";
    let isLoading = false;

    const searchInput = document.getElementById('search-input');
    const userListContainer = document.getElementById('search-results');
    const spinner = document.getElementById('loading-spinner');

    // Lắng nghe sự kiện gõ phím tìm kiếm (Debounce 300ms)
    let timeout = null;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            currentKeyword = e.target.value;
            currentPage = 0; // Reset trang về 0 khi gõ từ khóa mới
            fetchUsers(true);
        }, 300);
    });

    // Hàm gọi API lấy danh sách User
    async function fetchUsers(isNewSearch = false) {
        if (isLoading) return;
        isLoading = true;
        spinner.classList.remove('hidden');

        if (isNewSearch) {
            userListContainer.innerHTML = "";
        }

        try {
            const response = await fetch(`/search/users?keyword=${encodeURIComponent(currentKeyword)}&page=${currentPage}`);
            const users = await response.json();

            if (users.length === 0 && isNewSearch) {
                userListContainer.innerHTML = `<p class="text-center text-gray-400 text-sm mt-10">Không tìm thấy người dùng phù hợp.</p>`;
                spinner.classList.add('hidden');
                isLoading = false;
                return;
            }

            users.forEach(user => {
                // ĐÃ SỬA LỖI: Đổi từ user.isFollowing sang user.following để khớp với định dạng JSON nhận về từ Backend
                const btnText = user.following ? 'Hủy theo dõi' : 'Theo dõi';
                const btnClass = user.following
                    ? 'bg-gray-200 hover:bg-gray-300 text-gray-800'
                    : 'bg-blue-500 hover:bg-blue-600 text-white';

                const userCard = `
                    <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition">
                        <div class="flex items-center space-x-4 cursor-pointer" onclick="window.location.href='/profile/${user.username}'">
                            <div class="relative">
                                <img src="${user.avatarUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                                     class="w-12 h-12 rounded-full object-cover border border-gray-100">
                                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-900 text-sm hover:underline">${user.username}</span>
                                <span class="text-xs text-gray-500 truncate max-w-[150px]">${user.fullName || 'Người dùng mới'}</span>
                            </div>
                        </div>

                        <div class="flex items-center space-x-2">
                            <button onclick="toggleFollowInSearch(this, '${user.username}')"
                                    class="px-3 py-1.5 text-xs font-bold rounded-lg transition ${btnClass}">
                                ${btnText}
                            </button>

                            <a href="/profile/${user.username}"
                               class="px-3 py-1.5 bg-gray-900 hover:bg-black text-white text-xs font-bold rounded-lg transition">
                                Xem
                            </a>
                        </div>
                    </div>`;
                userListContainer.insertAdjacentHTML('beforeend', userCard);
            });

            if (users.length > 0) currentPage++;
        } catch (err) {
            console.error('Lỗi tải dữ liệu tìm kiếm:', err);
        }

        isLoading = false;
        spinner.classList.add('hidden');
    }

    // Hàm gọi xử lý bấm nút Follow/Unfollow ngay tại trang tìm kiếm
    async function toggleFollowInSearch(button, username) {
        button.disabled = true;
        try {
            const response = await fetch(`/profile/${username}/follow`, { method: 'POST' });
            const data = await response.json();

            if (data.success) {
                // Đoạn này giữ nguyên là data.isFollowing vì map thủ công từ backend trả về key này nguyên bản
                if (data.isFollowing) {
                    button.innerText = 'Hủy theo dõi';
                    button.className = "px-3 py-1.5 text-xs font-bold rounded-lg transition bg-gray-200 hover:bg-gray-300 text-gray-800";
                } else {
                    button.innerText = 'Theo dõi';
                    button.className = "px-3 py-1.5 text-xs font-bold rounded-lg transition bg-blue-500 hover:bg-blue-600 text-white";
                }
            } else {
                alert(data.message || "Có lỗi xảy ra");
            }
        } catch (err) {
            console.error("Lỗi khi thay đổi trạng thái theo dõi:", err);
        } finally {
            button.disabled = false;
        }
    }

    // Cuộn vô hạn (Infinite Scroll)
    const mainContainer = document.querySelector('main');
    mainContainer.addEventListener('scroll', () => {
        if ((mainContainer.scrollTop + mainContainer.clientHeight) >= mainContainer.scrollHeight - 100 && !isLoading) {
            fetchUsers(false);
        }
    });

    // Tự động kích hoạt tải danh sách gợi ý ngẫu nhiên ngay khi vừa vào trang tìm kiếm lần đầu
    document.addEventListener("DOMContentLoaded", () => {
        fetchUsers(true);
    });
</script>
</body>
</html>
