<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm kiếm • Instagram Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

<div class="flex h-screen">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="flex-1 pl-20 xl:pl-64 h-screen overflow-y-auto">
        <div class="max-w-2xl mx-auto pt-10 px-6 pb-20">

            <h2 class="text-2xl font-bold mb-8">Tìm kiếm</h2>

            <div class="relative mb-10">
                <input type="text" id="search-input"
                       placeholder="Nhập tên người dùng..."
                       class="w-full bg-white border border-gray-300 rounded-lg py-3 px-4 outline-none focus:border-gray-500 transition shadow-sm">
                <i class="fa-solid fa-magnifying-glass absolute right-4 top-3.5 text-gray-400"></i>
            </div>

            <div id="search-results" class="space-y-6">
            </div>

            <div id="loading-spinner" class="text-center py-6 hidden">
                <i class="fa-solid fa-spinner fa-spin text-2xl text-gray-400"></i>
            </div>

        </div>
    </main>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    const spinner = document.getElementById('loading-spinner');

    let currentPage = 0;
    let currentKeyword = '';
    let isLoading = false;

    window.onload = () => fetchUsers(true);

    searchInput.addEventListener('input', (e) => {
        currentKeyword = e.target.value;
        currentPage = 0;
        fetchUsers(true);
    });

    async function fetchUsers(isReset = false) {
        if (isLoading) return;
        isLoading = true;

        // Hiện spinner khi đang load
        spinner.classList.remove('hidden');

        try {
            const response = await fetch(`/search/users?keyword=${encodeURIComponent(currentKeyword)}&page=${currentPage}`);
            const users = await response.json();

            if (isReset) {
                resultsContainer.innerHTML = '';
                // Thêm tiêu đề phân loại
                const title = document.createElement('h3');
                title.className = "text-sm font-bold text-gray-400 uppercase tracking-wider mb-4";
                title.innerText = currentKeyword.trim() === '' ? 'Gợi ý cho bạn' : 'Kết quả tìm kiếm';
                resultsContainer.appendChild(title);
            }

            if (users.length === 0 && isReset) {
                resultsContainer.innerHTML += `
                    <div class="text-center py-20 animate-in fade-in">
                        <i class="fa-regular fa-face-frown text-4xl text-gray-300 mb-3"></i>
                        <p class="text-gray-400 text-sm font-medium">Không tìm thấy tài khoản nào.</p>
                    </div>`;
                spinner.classList.add('hidden');
                isLoading = false;
                return;
            }

            users.forEach(user => {
                resultsContainer.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-all duration-200">
                        <div class="flex items-center space-x-3">
                            <div class="relative">
                                <img src="${user.avatarUrl || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                                     class="w-12 h-12 rounded-full object-cover border border-gray-100">
                                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-gray-900 text-sm hover:underline cursor-pointer">${user.username}</span>
                                <span class="text-xs text-gray-500 truncate max-w-[150px]">${user.fullName || 'Người dùng mới'}</span>
                            </div>
                        </div>
                        <a href="/profile/${user.username}"
                           class="px-4 py-1.5 bg-gray-900 hover:bg-black text-white text-xs font-bold rounded-lg transition">
                            Xem
                        </a>
                    </div>`;
            });

            if(users.length > 0) currentPage++;
        } catch (err) { console.error('Lỗi tải dữ liệu:', err); }

        isLoading = false;
        spinner.classList.add('hidden');
    }

    const mainContainer = document.querySelector('main');
    mainContainer.addEventListener('scroll', () => {
        if ((mainContainer.scrollTop + mainContainer.clientHeight) >= mainContainer.scrollHeight - 100 && !isLoading) {
            fetchUsers(false);
        }
    });
</script></body>
</html>
