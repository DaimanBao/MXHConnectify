<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu • Instagram Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-screen p-4 text-gray-900 font-sans antialiased">

<div class="w-full max-w-[350px] space-y-3">
    <div class="bg-white border border-gray-200 p-8 flex flex-col items-center rounded-sm shadow-sm">
        <h1 class="font-serif text-3xl font-bold tracking-wide my-4 select-none">Instagram</h1>
        <p class="text-gray-400 font-semibold text-center text-sm mb-6">Tạo mật khẩu mới mạnh mẽ để bảo vệ tài khoản của bạn.</p>

        <div th:if="${errorMessage}" class="w-full bg-red-50 text-red-600 text-xs p-3 rounded mb-4 text-center border border-red-100" th:text="${errorMessage}"></div>

        <form th:action="@{/reset-password}" method="POST" class="w-full space-y-2">
            <input type="hidden" name="token" th:value="${token}">

            <div class="relative w-full">
                <input type="password" name="password" id="reset-password-input" placeholder="Mật khẩu mới" required
                       class="w-full bg-gray-50 border border-gray-200 rounded-[3px] p-2 pr-10 text-xs outline-none focus:border-gray-400 placeholder-gray-400 transition duration-150">
                <button type="button" onclick="togglePassword('reset-password-input', 'eye-icon-reset')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i id="eye-icon-reset" class="fas fa-eye-slash text-sm"></i>
                </button>
            </div>

            <div class="relative w-full">
                <input type="password" name="confirmPassword" id="reset-confirm-input" placeholder="Xác nhận mật khẩu mới" required
                       class="w-full bg-gray-50 border border-gray-200 rounded-[3px] p-2 pr-10 text-xs outline-none focus:border-gray-400 placeholder-gray-400 transition duration-150">
                <button type="button" onclick="togglePassword('reset-confirm-input', 'eye-icon-confirm')"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i id="eye-icon-confirm" class="fas fa-eye-slash text-sm"></i>
                </button>
            </div>

            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold text-sm py-1.5 rounded transition duration-200 mt-2">
                Đổi mật khẩu
            </button>
        </form>
    </div>

    <div class="bg-white border border-gray-200 p-6 text-center text-sm rounded-sm shadow-sm">
        <a href="/login" class="text-blue-500 font-semibold hover:underline">Quay lại trang Đăng nhập</a>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(iconId);

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
        }
    }
</script>
</body>
</html>
