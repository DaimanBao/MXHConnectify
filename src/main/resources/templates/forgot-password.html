<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu • Instagram Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-screen p-4 text-gray-900 font-sans antialiased">

<div class="w-full max-w-[350px] space-y-3">
    <div class="bg-white border border-gray-200 p-8 flex flex-col items-center text-center rounded-sm shadow-sm">

        <div class="border-2 border-black p-4 rounded-full mb-4 w-20 h-20 flex items-center justify-center select-none">
            <i class="fas fa-lock text-4xl"></i>
        </div>

        <h2 class="font-semibold text-gray-700 text-sm mb-2">Bạn gặp sự cố khi đăng nhập?</h2>
        <p class="text-xs text-gray-400 mb-6 px-2">Nhập email của bạn và chúng tôi sẽ gửi cho bạn một liên kết để khôi phục lại mật khẩu, truy cập lại vào tài khoản.</p>

        <div th:if="${errorMessage}" class="w-full bg-red-50 text-red-600 text-xs p-3 rounded mb-4 border border-red-100" th:text="${errorMessage}"></div>

        <div th:if="${successMessage}" class="w-full bg-green-50 text-green-600 text-xs p-3 rounded mb-4 border border-green-100" th:text="${successMessage}"></div>

        <form th:action="@{/forgot-password}" method="POST" class="w-full space-y-3">
            <input type="email" name="email" required placeholder="Địa chỉ Email"
                   class="w-full bg-gray-50 border border-gray-200 rounded-[3px] p-2 text-xs outline-none focus:border-gray-400 placeholder-gray-400 transition duration-150">

            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold text-sm py-1.5 rounded transition duration-200">
                Gửi liên kết đăng nhập
            </button>
        </form>

        <div class="relative flex py-5 items-center w-full">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 font-bold text-xs select-none">HOẶC</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <a href="/register" class="text-xs font-semibold text-gray-800 hover:text-black">Tạo tài khoản mới</a>
    </div>

    <div class="bg-white border border-gray-200 p-4 text-center text-xs font-semibold rounded-sm shadow-sm">
        <a href="/login" class="text-gray-800 hover:underline">Quay lại trang Đăng nhập</a>
    </div>
</div>

</body>
</html>
